<div th:fragment="content"
     xmlns:th="http://www.thymeleaf.org">
     
<link rel="stylesheet" th:href="@{/css/theme.css}">

<div class="container py-5">

    <!-- HEADER -->
    <div class="hero-section text-center mb-5">

        <h2 class="hero-title mb-2"
            th:text="#{return.title}">
            📋 My To-Return List
        </h2>

        <p class="hero-subtitle"
           th:text="#{return.subtitle}">
            Your borrowed books list
        </p>

        <div class="mt-4 d-inline-block">

            <div class="badge bg-primary px-4 py-3 rounded-pill shadow-sm">

                <span class="me-2"
                      th:text="#{return.items}">
                    Items
                </span>

                <strong th:text="${#lists.size(rents)}">0</strong>

            </div>

        </div>

    </div>

    <!-- TABLE CARD -->
    <div class="card theme-card shadow-sm border-0">

        <div class="table-responsive">

            <table class="table table-hover align-middle mb-0">

                <thead class="table-light">

                <tr class="text-uppercase small text-muted">

                    <th class="ps-4" th:text="#{return.book}">Book</th>
                    <th class="text-center" th:text="#{return.borrowed}">Borrowed</th>
                    <th class="text-center" th:text="#{return.due}">Due</th>
                    <th class="text-end pe-4" th:text="#{return.action}">Action</th>

                </tr>

                </thead>

                <tbody>

                <tr th:each="rent : ${rents}">

                    <!-- BOOK -->
                    <td class="ps-4">

                        <div class="d-flex align-items-center gap-3">

                            <div class="icon-box">
                                <i class="bi bi-book-half"></i>
                            </div>

                            <div>

                                <div class="fw-bold"
                                     th:text="${rent.book.title}">
                                </div>

                                <small class="text-muted"
                                       th:text="${rent.book.author}">
                                </small>

                            </div>

                        </div>

                    </td>

                    <!-- BORROWED -->
                    <td class="text-center">

                        <span th:text="${#temporals.format(rent.rentDate,'dd MMM yyyy')}"></span>

                    </td>

                    <!-- DUE -->
                    <td class="text-center text-danger fw-bold">

                        <span th:text="${#temporals.format(rent.dueDate,'dd MMM yyyy')}"></span>

                    </td>

                    <!-- ACTION -->
                    <td class="text-end pe-4">

                        <button class="btn btn-primary btn-sm rounded-pill px-4">

                            <i class="bi bi-arrow-return-left me-1"></i>

                            <span th:text="#{return.btn}">
                                Return
                            </span>

                        </button>

                    </td>

                </tr>

                <!-- EMPTY -->
                <tr th:if="${#lists.isEmpty(rents)}">

                    <td colspan="4" class="text-center py-5">

                        <div class="empty-box">

                            <i class="bi bi-check2-circle text-success fs-1"></i>

                            <h4 class="mt-3" th:text="#{return.empty}">
                                All caught up!
                            </h4>

                            <p class="text-muted"
                               th:text="#{return.empty.desc}">
                                No books to return
                            </p>

                            <a th:href="@{/books}"
                               class="btn btn-outline-primary rounded-pill px-4">

                                <span th:text="#{return.browse}">
                                    Browse Books
                                </span>

                            </a>

                        </div>

                    </td>

                </tr>

                </tbody>

            </table>

        </div>

    </div>

</div>

</div>
