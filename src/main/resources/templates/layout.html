<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📖 Lib-Management System</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css">
<link rel="stylesheet" href="https://cdn.datatables.net/buttons/2.4.1/css/buttons.bootstrap5.min.css">
<link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
<link href="https://cdn.jsdelivr.net/npm/select2-bootstrap-5-theme@1.3.0/dist/select2-bootstrap-5-theme.min.css" rel="stylesheet" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
<link rel="stylesheet" th:href="@{/css/theme.css}">
<link rel="stylesheet" th:href="@{/css/admin.css}">
<meta name="_csrf" th:content="${_csrf.token}">
<meta name="_csrf_header" th:content="${_csrf.headerName}">

<style>
    /* ========================= RESPONSIVE CORE STRUCTURE ========================= */
    body {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        transition: background-color 0.3s ease, color 0.3s ease;
    }
    .admin-navbar {
        background-color: #ffffff;
        border-bottom: 1px solid #e3e6f0;
        z-index: 1030;
        position: sticky;
        top: 0;
        transition: background-color 0.3s ease, border-color 0.3s ease;
    }
    .layout-container {
        display: flex;
        flex: 1;
        position: relative;
    }
    .desktop-aside {
        width: 260px;
        position: sticky;
        top: 57px; 
        height: calc(100vh - 57px);
        background-color: #212529;
        z-index: 1000;
        overflow-y: auto;
    }
    .admin-content {
        flex: 1;
        min-width: 0; 
        padding: 1.5rem;
        background-color: #f8f9fc;
        transition: background-color 0.3s ease;
    }
    .admin-badge {
        background: #e8f5e9;
        color: #1b5e20;
        padding: 4px 12px;
        border-radius: 50px;
        font-weight: 600;
        font-size: 0.85rem;
    }
    
    /* ========================= ULTIMATE GLOBAL DARK MODE STYLES ========================= */
    body.dark-mode {
        background-color: #121212 !important;
        color: #e0e0e0 !important;
    }
    
    /* Top Navbar */
    body.dark-mode .admin-navbar {
        background-color: #1e1e1e !important;
        border-color: #2d2d2d !important;
    }
    
    /* Main Content Background */
    body.dark-mode .admin-content {
        background-color: #121212 !important;
    }
    
    /* Headings, Text Labels, Muted Subtexts */
    body.dark-mode h1, body.dark-mode h2, body.dark-mode h3, 
    body.dark-mode h4, body.dark-mode h5, body.dark-mode h6,
    body.dark-mode .text-dark, body.dark-mode text-dark {
        color: #ffffff !important;
    }
    body.dark-mode .text-muted {
        color: #a0a0a0 !important;
    }
    
    /* Cards, List items, and Modals */
    body.dark-mode .card,
    body.dark-mode .modal-content,
    body.dark-mode .list-group-item {
        background-color: #1e1e1e !important;
        color: #ffffff !important;
        border-color: #2d2d2d !important;
    }
    body.dark-mode .card-header, 
    body.dark-mode .card-footer,
    body.dark-mode .modal-header,
    body.dark-mode .modal-footer {
        background-color: #252525 !important;
        color: #ffffff !important;
        border-color: #2d2d2d !important;
    }
    
    /* DataTables & Tables Custom Overrides */
    body.dark-mode table,
    body.dark-mode table.dataTable,
    body.dark-mode .table {
        background-color: #1e1e1e !important;
        color: #e0e0e0 !important;
        border-color: #2d2d2d !important;
    }
    body.dark-mode table.dataTable thead th,
    body.dark-mode .table thead th {
        background-color: #252525 !important;
        color: #ffffff !important;
        border-color: #333333 !important;
    }
    body.dark-mode table.dataTable tbody td,
    body.dark-mode .table tbody td {
        background-color: #1e1e1e !important;
        color: #e0e0e0 !important;
        border-color: #2d2d2d !important;
    }
    body.dark-mode .dataTables_wrapper .dataTables_length, 
    body.dark-mode .dataTables_wrapper .dataTables_filter, 
    body.dark-mode .dataTables_wrapper .dataTables_info, 
    body.dark-mode .dataTables_wrapper .dataTables_processing, 
    body.dark-mode .dataTables_wrapper .dataTables_paginate {
        color: #e0e0e0 !important;
    }
    body.dark-mode .dataTables_wrapper .dataTables_filter input,
    body.dark-mode .dataTables_wrapper .dataTables_length select {
        background-color: #252525 !important;
        color: #ffffff !important;
        border: 1px solid #444 !important;
    }
    body.dark-mode table.dataTable.no-footer {
        border-bottom: 1px solid #2d2d2d !important;
    }
    
    /* Input Form Fields */
    body.dark-mode .form-control,
    body.dark-mode .form-select {
        background-color: #252525 !important;
        color: #ffffff !important;
        border-color: #444444 !important;
    }
    body.dark-mode .form-control:focus,
    body.dark-mode .form-select:focus {
        background-color: #2a2a2a !important;
        color: #ffffff !important;
    }
    
    /* Badges & Extra Elements */
    body.dark-mode .admin-badge {
        background: #1b5e20 !important;
        color: #ffffff !important;
    }
    body.dark-mode .bg-light {
        background-color: #252525 !important;
    }
</style>
</head>
<body class="bg-light">

	<nav class="admin-navbar d-flex justify-content-between align-items-center px-3 py-2 shadow-sm">
		<div class="d-flex align-items-center gap-2">
            <button class="btn btn-outline-secondary d-lg-none me-1 px-2 py-1" type="button" data-bs-toggle="offcanvas" data-bs-target="#mobileSidebar" aria-controls="mobileSidebar">
                <i class="bi bi-list fs-4"></i>
            </button>
			<h5 class="mb-0 fw-bold text-success">📚 Admin Panel</h5>
			<span class="admin-badge d-none d-sm-inline-block"> 
                <i class="bi bi-person-circle me-1"></i>
				<span th:text="${#authentication.name}">Admin</span>
			</span>
		</div>
		<div class="d-flex align-items-center gap-3">
			<button class="btn btn-sm btn-outline-secondary rounded-pill" id="darkToggle">🌙</button>
		</div>
	</nav>

	<div class="layout-container">
		
		<aside class="desktop-aside d-none d-lg-block">
			<div th:replace="~{fragments/sidebar :: sidebar}"></div>
		</aside>

        <div class="offcanvas offcanvas-start bg-dark text-white p-0" tabindex="-1" id="mobileSidebar" aria-labelledby="mobileSidebarLabel" style="width: 280px;">
            <div class="offcanvas-header justify-content-end bg-dark p-2 border-bottom border-secondary">
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas" aria-label="Close"></button>
            </div>
            <div class="offcanvas-body p-0 bg-dark">
                <div th:replace="~{fragments/sidebar :: sidebar}"></div>
            </div>
        </div>

		<main class="admin-content">
			<div th:replace="__${content}__"></div>
		</main>
	</div>

	<script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>

    <script>
        $(document).ready(function () {
            // Dark mode logic (Only toggles body, CSS selectors handle child components)
            $("#darkToggle").on("click", function () {
                $("body").toggleClass("dark-mode");
                $(this).text($("body").hasClass("dark-mode") ? "☀️" : "🌙");
            });
        });
    

    $(function () {
     console.log("!!! RENT SCRIPT INITIALIZED !!!");

    $(document).ready(function() {
        if ($.fn.DataTable.isDataTable('#bookTable')) {
            $('#bookTable').DataTable().destroy();
        }
        var bTable = $('#bookTable').DataTable({
            destroy: true, 
            scrollX: true,
            pageLength: 10
        });

        if ($.fn.DataTable.isDataTable('#userTable')) {
            $('#userTable').DataTable().destroy();
        }
        var uTable = $('#userTable').DataTable({
            destroy: true, 
            pageLength: 10
        });
    });

     $(document).on('click', '.select-book', function (e) {
         e.preventDefault();
         var id = $(this).attr('data-id');
         var title = $(this).attr('data-title');
         
         $('#bookId').val(id);
         $('#bookName').val(title);
         
         $('#bookTable tbody tr').removeClass('table-success');
         $(this).closest('tr').addClass('table-success');
     });

     $(document).on('click', '.select-user', function (e) {
         e.preventDefault();
         var id = $(this).attr('data-id');
         var name = $(this).attr('data-name');

         $('#userId').val(id);
         $('#userName').val(name);

         $('#userTable tbody tr').removeClass('table-primary');
         $(this).closest('tr').addClass('table-primary');
     });
    });

    /*<![CDATA[*/
    $(function () {
        var bTable = $('#bookTable').DataTable({ scrollX: true, pageLength: 5 });
        var uTable = $('#userTable').DataTable({ pageLength: 5 });

        var today = new Date().toISOString().split('T')[0];
        var nextWeek = new Date();
        nextWeek.setDate(nextWeek.getDate() + 7);
        var dueStr = nextWeek.toISOString().split('T')[0];

        $('#rentDate').val(today);
        $('#dueDate').val(dueStr);

        $(document).on('click', '.select-book', function (e) {
            e.preventDefault();
            var id = $(this).attr('data-id');
            var title = $(this).attr('data-title');
            $('#bookId').val(id); 
            $('#bookName').val(title); 
            $('#bookTable tbody tr').removeClass('table-success');
            $(this).closest('tr').addClass('table-success');
        });

        $(document).on('click', '.select-user', function (e) {
            e.preventDefault();
            var id = $(this).attr('data-id');
            var name = $(this).attr('data-name');
            $('#userId').val(id); 
            $('#userName').val(name); 
            $('#userTable tbody tr').removeClass('table-primary');
            $(this).closest('tr').addClass('table-primary');
        });

        $(function () {
            $('#confirmRent').on('click', function (e) {
                e.preventDefault();
                let uId = $('#userId').val();
                let bId = $('#bookId').val();
                let rDate = $('#rentDate').val();
                let dDate = $('#dueDate').val();

                if (!uId || !bId || !rDate || !dDate) {
                    alert("⚠️ Please fill all fields");
                    return;
                }

                let token = $('meta[name="_csrf"]').attr('content');
                let header = $('meta[name="_csrf_header"]').attr('content');

                $.ajax({
                    type: "POST",
                    url: "/admin/rents/save",
                    beforeSend: function(xhr) {
                        xhr.setRequestHeader(header, token);
                    },
                    data: {
                        userId: uId,
                        bookId: bId,
                        rentDate: rDate,
                        dueDate: dDate
                    },
                    success: function () {
                        alert("✅ Rent Success");
                        window.location.href = "/admin/rents";
                    },
                    error: function (xhr) {
                        alert("❌ " + xhr.status + " " + xhr.responseText);
                    }
                });
            });
        });
    });
    /*]]>*/

    document.addEventListener("DOMContentLoaded", function () {
        const editModal = document.getElementById('editCategoryModal');
        if (editModal) {
            editModal.addEventListener('show.bs.modal', function (event) {
                const button = event.relatedTarget;
                const id = button.getAttribute('data-id');
                const name = button.getAttribute('data-name');
                document.getElementById("cat-id").value = id;
                document.getElementById("cat-name").value = name;
            });
        }
    });

    $(document).ready(function() {
        if ($.fn.DataTable.isDataTable('#rentTable')) {
            $('#rentTable').DataTable().destroy();
        }
        $('#rentTable').DataTable({
            destroy: true, 
            scrollX: true,
            pageLength: 10
        });
    });
    
    
    $(document).ready(function() {
        if ($.fn.DataTable.isDataTable('#categoryTable')) {
            $('#categoryTable').DataTable().destroy();
        }
        $('#categoryTable').DataTable({
            destroy: true, 
            scrollX: true,
            pageLength: 10
        });
    });
    </script>
</body>
</html>
