<div th:fragment="content" xmlns:th="http://www.thymeleaf.org">
    <div class="container py-4">
        
        <div class="d-flex flex-column flex-sm-row justify-content-between align-items-start align-items-sm-center mb-4 gap-3">
            <div>
                <h2 class="fw-bold text-dark m-0">
                    <i class="bi bi-speedometer2 text-primary me-2"></i>System Overview
                </h2>
                <p class="text-muted m-0 small">Real-time library metrics and management</p>
            </div>
            <span class="badge bg-light text-dark border px-3 py-2 rounded-pill shadow-sm font-monospace">
                <i class="bi bi-calendar3 me-2 text-primary"></i>2026 Overview
            </span>
        </div>

        <div class="row row-cols-1 row-cols-sm-2 row-cols-xl-4 g-4 mb-5">
            
            <div class="col">
                <div class="card h-100 border-0 bg-primary text-white shadow-sm dashboard-card rounded-4">
                    <div class="card-body p-4 d-flex justify-content-between align-items-center">
                        <div>
                            <small class="text-white-50 fw-bold text-uppercase tracking-wider">Total Books</small>
                            <h2 class="display-5 fw-bold m-0 mt-1" th:text="${totalBooks != null ? totalBooks : '23'}">23</h2>
                        </div>
                        <div class="icon-shape bg-white bg-opacity-20 rounded-3 p-3 fs-1">
                            <i class="bi bi-bookshelf"></i>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col">
                <div class="card h-100 border-0 bg-success text-white shadow-sm dashboard-card rounded-4">
                    <div class="card-body p-4 d-flex justify-content-between align-items-center">
                        <div>
                            <small class="text-white-50 fw-bold text-uppercase tracking-wider">Active Users</small>
                            <h2 class="display-5 fw-bold m-0 mt-1" th:text="${activeUsers != null ? activeUsers : '3'}">3</h2>
                        </div>
                        <div class="icon-shape bg-white bg-opacity-20 rounded-3 p-3 fs-1">
                            <i class="bi bi-people-fill"></i>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col">
                <div class="card h-100 border-0 bg-warning text-dark shadow-sm dashboard-card rounded-4">
                    <div class="card-body p-4 d-flex justify-content-between align-items-center">
                        <div>
                            <small class="text-dark-50 fw-bold text-uppercase tracking-wider">Rented Books</small>
                            <h2 class="display-5 fw-bold m-0 mt-1" th:text="${rentedBooks != null ? rentedBooks : '4'}">4</h2>
                        </div>
                        <div class="icon-shape bg-dark bg-opacity-10 rounded-3 p-3 fs-1">
                            <i class="bi bi-journal-bookmark-fill"></i>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col">
                <div class="card h-100 border-0 bg-danger text-white shadow-sm dashboard-card rounded-4">
                    <div class="card-body p-4 d-flex justify-content-between align-items-center">
                        <div>
                            <small class="text-white-50 fw-bold text-uppercase tracking-wider">Favorites</small>
                            <h2 class="display-5 fw-bold m-0 mt-1" th:text="${favoritesCount != null ? favoritesCount : '5'}">5</h2>
                        </div>
                        <div class="icon-shape bg-white bg-opacity-20 rounded-3 p-3 fs-1">
                            <i class="bi bi-heart-fill"></i>
                        </div>
                    </div>
                </div>
            </div>

        </div>

        <div class="row">
            <div class="col-12 col-lg-6 mx-auto">
                <div class="card border-0 shadow-sm rounded-4 p-4 bg-white">
                    <h5 class="fw-bold text-dark mb-4 pb-2 border-bottom">
                        <i class="bi bi-lightning-charge-fill text-warning me-2"></i>Recent Actions
                    </h5>
                    
                    <div class="d-flex flex-column gap-3">
                        <div class="p-3 bg-light rounded-3 d-flex flex-column flex-sm-row justify-content-between align-items-start align-items-sm-center gap-2">
                            <div>
                                <span class="text-muted d-block small">Quick Link</span>
                                <strong class="text-dark">Inventory Explorer</strong>
                            </div>
                            <a href="/admin/books" class="btn btn-sm btn-outline-primary rounded-pill px-3">
                                View All Books <i class="bi bi-arrow-right ms-1"></i>
                            </a>
                        </div>

                        <div class="p-3 bg-light rounded-3 d-flex flex-column flex-sm-row justify-content-between align-items-start align-items-sm-center gap-2">
                            <div>
                                <span class="text-muted d-block small">Inventory Management</span>
                                <strong class="text-dark">Organize Structure</strong>
                            </div>
                            <a href="/admin/categories" class="btn btn-sm btn-outline-primary rounded-pill px-3">
                                Manage Categories <i class="bi bi-arrow-right ms-1"></i>
                            </a>
                        </div>
                    </div>

                </div>
            </div>
        </div>

    </div>

    <style>
        .tracking-wider { letter-spacing: 0.05em; }
        .dashboard-card {
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .dashboard-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 .5rem 1.5rem rgba(0,0,0,.12)!important;
        }
        .icon-shape {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 60px;
            height: 60px;
        }
    </style>
</div>
