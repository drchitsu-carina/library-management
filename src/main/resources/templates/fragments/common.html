        <div class="carousel-inner">

            <div class="carousel-item active">

                <img th:src="@{/images/lib-cover.JPG}"

                <div class="carousel-caption">

                    <p>Explore knowledge in Myanmar and English.</p>

            </div>

            <div class="carousel-item">

                <img th:src="@{/images/spsu-gate.jpg}"
                     class="d-block w-100" alt="SPSU Gate">

                <div class="hero-overlay"></div>

                <div class="carousel-caption">
                    <h1>📖 Modern University Library</h1>
                    <p>Read, borrow and manage books anywhere.</p>

            </div>

        </div>

</div>
