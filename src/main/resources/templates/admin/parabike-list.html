<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{defaultLayout :: content}">
<body>

<div th:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-4 p-3 bg-white shadow-sm rounded-4">
        <div>
            <h3 class="fw-bold mb-0 text-success">
                📜 Manuscript Management
            </h3>
            <small class="text-muted">Manage Palm-leaf and Parabaik collections</small>
        </div>

        <button class="btn btn-success rounded-pill px-4 shadow-sm"
                data-bs-toggle="modal"
                data-bs-target="#addManuscriptModal">
            ➕ Add Manuscript
        </button>
    </div>

    <div th:if="${message}" class="alert alert-success alert-dismissible fade show rounded-4 shadow-sm" role="alert">
        <span th:text="${message}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
    </div>

    <div class="card border-0 shadow-sm rounded-4 overflow-hidden">
        <div class="card-body p-3">
            <div class="table-responsive">
                <table id="manuscriptTable" class="table table-hover align-middle mb-0">
                    <thead class="table-success text-dark">
                        <tr>
                            <th>ID</th>
                            <th>No.</th>
                            <th>Accession No.</th>
                            <th>Name (Title)</th>
                            <th>Begin (အစ)</th>
                            <th>End (အဆုံး)</th>
                            <th>Decoration</th>
                            <th>Remark</th>
                            <th class="text-center">Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="p : ${parabikes}">
                            <td th:text="${p.id}" class="fw-bold text-muted"></td>
                            <td th:text="${p.no}"></td>
                            <td>
                                <span class="badge bg-light text-dark shadow-sm" th:text="${p.libOwnNo}"></span>
                            </td>
                            <td>
                                <div class="fw-bold text-success" th:text="${p.name}"></div>
                            </td>
                            <td th:text="${p.begin}"></td>
                            <td th:text="${p.end}"></td>
                            <td>
                                <div th:if="${p.goldLeafSugarCame != '-' and p.goldLeafSugarCame != null}">
                                    <span class="badge bg-warning text-dark rounded-pill" th:text="${p.goldLeafSugarCame}"></span>
                                </div>
                                <div th:if="${p.plainInkBorderedLeaf != '-' and p.plainInkBorderedLeaf != null}" class="mt-1">
                                    <small class="text-muted">ကြောင်းရေ:</small>
                                    <span class="badge bg-info text-white rounded-pill" th:text="${p.plainInkBorderedLeaf}"></span>
                                </div>
                            </td>
                            <td>
                                <small class="text-muted" th:text="${p.remark}"></small>
                            </td>
                            <td class="text-center">
                                <div class="btn-group">
                                    <button type="button"
                                            class="btn btn-sm btn-outline-primary rounded-pill px-3"
                                            data-bs-toggle="modal"
                                            data-bs-target="#editManuscriptModal"
                                            th:data-id="${p.id}"
                                            th:data-no="${p.no}"
                                            th:data-libownno="${p.libOwnNo}"
                                            th:data-name="${p.name}"
                                            th:data-begin="${p.begin}"
                                            th:data-end="${p.end}"
                                            th:data-plain="${p.plainInkBorderedLeaf}"
                                            th:data-gold="${p.goldLeafSugarCame}"
                                            th:data-remark="${p.remark}">
                                        ✏️ Edit
                                    </button>
                                    <a th:href="@{/admin/parabike/delete/{id}(id=${p.id})}"
                                       class="btn btn-sm btn-outline-danger rounded-pill px-3 ms-1"
                                       onclick="return confirm('ဖျက်ရန် သေချာပါသလား?')">
                                        🗑 Delete
                                    </a>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
                <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css">

    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>

    <script th:inline="javascript">
        $(document).ready(function() {
            // Table ID ဖြစ်သော #manuscriptTable ကို DataTables အဖြစ် ပြောင်းလဲခြင်း
            $('#manuscriptTable').DataTable({
                "pageLength": 10, // တစ်ခါပြလျှင် ၁၀ ခုပြရန်
                "ordering": true, // Sorting လုပ်ခွင့်ပြုရန်
                "language": {
                    "search": "Seach : ", // Search label ကို ဖျောက်ပစ်ရန် (Placeholder သုံးမည်)
                    "searchPlaceholder": "🔍 Search manuscripts...", // Search box ထဲတွင် ပေါ်မည့်စာသား
                    "lengthMenu": "Show _MENU_ entries",
                    "info": "Showing _START_ to _END_ of _TOTAL_ entries",
                    "paginate": {
                        "next": "Next",
                        "previous": "Prev"
                    }
                },
                "columnDefs": [
                    { "orderable": false, "targets": 8 } // 'Action' column ကို sorting ပိတ်ထားခြင်း
                ],
                "dom": '<"d-flex justify-content-between align-items-center mb-3"f>rt<"d-flex justify-content-between align-items-center mt-3"ip>'
                // 'f' သည် search box ဖြစ်ပြီး ၎င်းကို ညာဘက်အပေါ်တွင် ထားရှိရန် design ပြင်ခြင်း
            });

            // Search box ကို Bootstrap style ပြင်ရန်
            $('.dataTables_filter input').addClass('form-control shadow-sm border-2 border-success');
        });
    </script>
            </div>
        </div>
    </div>

    <div class="modal fade" id="addManuscriptModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content border-0 shadow-lg rounded-4">
                <form th:action="@{/admin/parabike/save}" method="post">
                    <div class="modal-header bg-success text-white">
                        <h5 class="modal-title">➕ Add New Manuscript</h5>
                        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body p-4">
                        <div class="row g-3">
                            <div class="col-md-4">
                                <label class="form-label fw-bold">No. (စဉ်)</label>
                                <input type="text" name="no" class="form-control rounded-3" placeholder="ဥပမာ- ၁။">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-bold">Accession No. (တိုက်ပိုင်အမှတ်)</label>
                                <input type="number" name="libOwnNo" class="form-control rounded-3" required>
                            </div>
                            <div class="col-md-12">
                                <label class="form-label fw-bold">Manuscript Name (အမည်)</label>
                                <input type="text" name="name" class="form-control rounded-3" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Begin (အစစာမျက်နှာ)</label>
                                <input type="text" name="begin" class="form-control rounded-3">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold">End (အဆုံးစာမျက်နှာ)</label>
                                <input type="text" name="end" class="form-control rounded-3">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Plain Ink Bordered (ကြောင်းပေ)</label>
                                <input type="text" name="plainInkBorderedLeaf" class="form-control rounded-3">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Gold/Sugar Cane (ရွှေပိန်း/ကြံဆစ်)</label>
                                <input type="text" name="goldLeafSugarCame" class="form-control rounded-3">
                            </div>
                            <div class="col-md-12">
                                <label class="form-label fw-bold">Remark (မှတ်ချက်)</label>
                                <textarea name="remark" class="form-control rounded-3" rows="2"></textarea>
                            </div>
                        </div>
                    </div>
                    <div class="modal-footer bg-light rounded-bottom-4">
                        <button type="button" class="btn btn-secondary rounded-pill px-4" data-bs-dismiss="modal">Close</button>
                        <button type="submit" class="btn btn-success rounded-pill px-4">Save Manuscript</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div class="modal fade" id="editManuscriptModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content border-0 shadow-lg rounded-4">
                <form th:action="@{/admin/parabike/save}" method="post">
                    <div class="modal-header bg-primary text-white">
                        <h5 class="modal-title">📝 Edit Manuscript Details</h5>
                        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body p-4">
                        <input type="hidden" name="id" id="e-id">
                        
                        <div class="row g-3">
                            <div class="col-md-4">
                                <label class="form-label fw-bold">No. (စဉ်)</label>
                                <input type="text" name="no" id="e-no" class="form-control rounded-3">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-bold">Accession No. (တိုက်ပိုင်)</label>
                                <input type="number" name="libOwnNo" id="e-libownno" class="form-control rounded-3">
                            </div>
                            <div class="col-md-12">
                                <label class="form-label fw-bold">Name (အမည်)</label>
                                <input type="text" name="name" id="e-name" class="form-control rounded-3" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Begin (အစ)</label>
                                <input type="text" name="begin" id="e-begin" class="form-control rounded-3">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold">End (အဆုံး)</label>
                                <input type="text" name="end" id="e-end" class="form-control rounded-3">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Plain/Ink (ကြောင်းပေ)</label>
                                <input type="text" name="plainInkBorderedLeaf" id="e-plain" class="form-control rounded-3">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Gold Style (ရွှေပိန်း/ကြံဆစ်)</label>
                                <input type="text" name="goldLeafSugarCame" id="e-gold" class="form-control rounded-3">
                            </div>
                            <div class="col-md-12">
                                <label class="form-label fw-bold">Remark (မှတ်ချက်)</label>
                                <textarea name="remark" id="e-remark" class="form-control rounded-3" rows="2"></textarea>
                            </div>
                        </div>
                    </div>
                    <div class="modal-footer bg-light rounded-bottom-4">
                        <button type="button" class="btn btn-secondary rounded-pill px-4" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-primary rounded-pill px-4">Update Details</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script th:inline="javascript">
        const editModal = document.getElementById('editManuscriptModal');
        if (editModal) {
            editModal.addEventListener('show.bs.modal', event => {
                const btn = event.relatedTarget;

                // Mapping: data-attributes to Modal Input IDs
                const mapping = {
                    'id': 'e-id',
                    'no': 'e-no',
                    'libownno': 'e-libownno',
                    'name': 'e-name',
                    'begin': 'e-begin',
                    'end': 'e-end',
                    'plain': 'e-plain',
                    'gold': 'e-gold',
                    'remark': 'e-remark'
                };

                Object.keys(mapping).forEach(key => {
                    const value = btn.getAttribute('data-' + key);
                    const element = document.getElementById(mapping[key]);
                    if (element) {
                        element.value = value || '';
                    }
                });
            });
        }
    </script>
</div>
</body>
</html>
