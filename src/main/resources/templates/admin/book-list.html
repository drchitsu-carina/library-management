<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: content}">
<body>

<div th:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-4 p-3 bg-white shadow-sm rounded-4">

    <div>
        <h3 class="fw-bold mb-0 text-success">
            📚 Book Management
        </h3>
        <small class="text-muted">Manage all library books here</small>
    </div>

    <button class="btn btn-success rounded-pill px-4 shadow-sm"
            data-bs-toggle="modal"
            data-bs-target="#addModal">
        ➕ Add Book
    </button>

</div>
    
    
    <!--Begin book table -->
    <div class="card border-0 shadow-sm rounded-4 overflow-hidden">

    <div class="card-body p-0">

        <div class="table-responsive">

            <table id="bookTable"
                   class="table table-hover align-middle mb-0">

                <thead class="table-success text-dark">
<tr>
    <th>ID</th>
    <th>Book</th>
    <th>Author</th>
    <th>Year</th>
    <th>Edition</th>
    <th>Publisher</th>
    <th>Accession No</th>
    <th>Building</th>
    <th>Category</th>
    <th>Status</th>
    <th class="text-center">Action</th>
</tr>
</thead>
                
                <tbody>
<tr th:each="book : ${books}">

    <!-- ID -->
    <td th:text="${book.id}">1</td>

    <!-- Book (Image + Title) -->
    <td>
        <div class="d-flex align-items-center">
            <img th:if="${book.image}"
                 th:src="${book.image}"
                 class="rounded me-2 shadow-sm"
                 style="width:45px;height:60px;object-fit:cover;">

            <div>
                <div class="fw-bold" th:text="${book.title}">Title</div>
            </div>
        </div>
    </td>

    <!-- Author -->
    <td th:text="${book.author}">Author</td>

    <!-- Year -->
    <td th:text="${book.publishedYear}">2024</td>

    <!-- Edition -->
    <td th:text="${book.edition}">1st</td>

    <!-- Publisher -->
    <td th:text="${book.publisher}">Publisher</td>

    <!-- Accession No -->
    <td>
        <span class="badge bg-light text-dark"
              th:text="${book.accessionNo}">
            ACC001
        </span>
    </td>

    <!-- Location -->
    <td>
        <div class="small">
            <div class="fw-semibold" th:text="${book.building}">Building A</div>
            <span class="text-muted" th:text="${book.shelfNo}">Shelf 1</span>
        </div>
    </td>

    <!-- Category -->
    <td>
        <span class="badge bg-primary"
              th:text="${book.category != null ? book.category.name : 'N/A'}">
        </span>
    </td>

    <!-- Status -->
    <td>
        <span class="badge px-3 py-2 rounded-pill"
              th:text="${book.rentStatus}"
              th:classappend="${book.rentStatus.name() == 'AVAILABLE'
                ? 'bg-success'
                : 'bg-warning text-dark'}">
        </span>
    </td>

    <!-- Action -->
    <td class="text-center">

        <div class="btn-group">

            <button type="button"
                    class="btn btn-sm btn-outline-primary rounded-pill px-3"
                    data-bs-toggle="modal"
                    data-bs-target="#editBookModal"

                    th:data-id="${book.id}"
                    th:data-title="${book.title}"
                    th:data-author="${book.author}"
                    th:data-year="${book.publishedYear}"
                    th:data-edition="${book.edition}"
                    th:data-publisher="${book.publisher}"
                    th:data-accession="${book.accessionNo}"
                    th:data-shelf="${book.shelfNo}"
                    th:data-building="${book.building}"
                    th:data-status="${book.rentStatus}"
                    th:data-category="${book.category != null ? book.category.id : ''}"
                    th:data-image="${book.image}">
                ✏️ Edit
            </button>

            <button type="button"
                    class="btn btn-sm btn-outline-danger rounded-pill px-3"
                    th:onclick="'deleteBook(' + ${book.id} + ')'">
                🗑 Delete
            </button>

        </div>

    </td>

</tr>
</tbody>
            
            </table>
        </div>
    </div>
</div>
    <!--End  book table -->

	<!-- Start add Book Modal -->
    <div class="modal fade" id="addModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <form th:action="@{/admin/books/save}" method="post" enctype="multipart/form-data">
                    <div class="modal-header">
                        <h5 class="modal-title">➕ Add New Book</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label">Title</label>
                                <input type="text" name="title" class="form-control" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Author</label>
                                <input type="text" name="author" class="form-control" required>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Category</label>
                                <select name="category.id" class="form-select">
                                    <option value="">Select Category</option>
                                    <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}"></option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Published Year</label>
                                <input type="number" name="publishedYear" class="form-control">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Edition</label>
                                <input type="text" name="edition" class="form-control">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Publisher</label>
                                <input type="text" name="publisher" class="form-control">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Accession No</label>
                                <input type="text" name="accessionNo" class="form-control">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Shelf No</label>
                                <input type="text" name="shelfNo" class="form-control">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Building</label>
                                <input type="text" name="building" class="form-control">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Status</label>
                                <select name="rentStatus" class="form-select">
                                    <option value="AVAILABLE">AVAILABLE</option>
                                    <option value="RENTED">RENTED</option>
                                    <option value="NOT_FOR_RENT">NOT_FOR_RENT</option>
                                </select>
                            </div>
                            <div class="col-md-12">
                                <label class="form-label">Cover Image</label>
                                <input type="file" name="file" class="form-control" accept="image/*">
                            </div>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                        <button type="submit" class="btn btn-primary">Save Book</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- End Add Book Modal -->
    
    
    <!-- Start Edit Book Modal -->
    
    <div class="modal fade" id="editBookModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header bg-light">
                <h5 class="modal-title">📝 Edit Book Details</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <form th:action="@{/admin/books/save}" method="post" enctype="multipart/form-data">
                <div class="modal-body">
                    <input type="hidden" name="id" id="m-id">
                    
                    <div class="row g-3">
                        <div class="col-md-4 border-end text-center">
                            <label class="form-label fw-bold">Current Cover</label>
                            <div class="mb-2">
                                <img id="m-preview" src="/images/books/default.png" 
                                     class="img-thumbnail shadow-sm" 
                                     style="height: 200px; width: 140px; object-fit: cover;">
                            </div>
                            <input type="file" name="file" id="m-file" class="form-control form-control-sm" 
                                   accept="image/*" onchange="previewImage(this)">
                        </div>

                        <div class="col-md-8">
                            <div class="row g-2">
                                <div class="col-12">
                                    <label class="form-label">Book Title</label>
                                    <input type="text" name="title" id="m-title" class="form-control" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Author</label>
                                    <input type="text" name="author" id="m-author" class="form-control">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Category</label>
                                    <select name="categoryId" id="m-category" class="form-select">
                                        <option value="">Select Category</option>
                                        <option th:each="cat : ${categories}" 
                                                th:value="${cat.id}" 
                                                th:text="${cat.name}"></option>
                                    </select>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Status</label>
                                    <select name="rentStatus" id="m-status" class="form-select">
                                        <option value="AVAILABLE">AVAILABLE</option>
                                    	<option value="RENTED">RENTED</option>
                                    	<option value="NOT_FOR_RENT">NOT_FOR_RENT</option>
                                    </select>
                                   
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Accession No.</label>
                                    <input type="text" name="accessionNo" id="m-accession" class="form-control">
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label">Year</label>
                                    <input type="number" name="publishedYear" id="m-year" class="form-control">
                                </div>
                                <div class="col-md-8">
                                    <label class="form-label">Publisher</label>
                                    <input type="text" name="publisher" id="m-publisher" class="form-control">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Building</label>
                                    <input type="text" name="building" id="m-building" class="form-control">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Shelf No.</label>
                                    <input type="text" name="shelfNo" id="m-shelf" class="form-control">
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-primary">Update Book</button>
                </div>
            </form>
        </div>
    </div>
</div>
    
    
    <!-- End Edit Book Modal -->
    
    
    <script th:inline='javascript'>

    const editBookModal = document.getElementById('editBookModal');
    if (editBookModal) {
        editBookModal.addEventListener('show.bs.modal', event => {
            const btn = event.relatedTarget;

            // Map data-attributes to Modal IDs
            const fields = {
                'id': 'm-id',
                'title': 'm-title',
                'author': 'm-author',
                'publisher': 'm-publisher',
                'year': 'm-year',
                'accession': 'm-accession',
                'status': 'm-status',
                'building': 'm-building',
                'shelf': 'm-shelf',
                'category': 'm-category'
            };

            // Set text and select values
            Object.keys(fields).forEach(key => {
                const value = btn.getAttribute('data-' + key);
                const element = document.getElementById(fields[key]);
                if (element) element.value = value || '';
            });

            // Handle Image Preview
            const imagePath = btn.getAttribute('data-image');
            const preview = document.getElementById('m-preview');
            const fileInput = document.getElementById('m-file');
            
            // Reset file input on open
            if(fileInput) fileInput.value = '';

            // Use book image if exists, else default placeholder
            preview.src = (imagePath && imagePath !== '') ? imagePath : '/images/books/default.png';
        });
    }

    // Function to preview image immediately when a new file is chosen
    function previewImage(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById('m-preview').src = e.target.result;
            };
            reader.readAsDataURL(input.files[0]);
        }
    }
</script>
	
	
	
	
</div>
</body>
</html>
