<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: content}">
<body>

<div th:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h3>👥 User Management</h3>
        <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addUserModal">
            ➕ Add User
        </button>
    </div>
    
    <div class="card border-0 shadow-sm rounded-4">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table id="userTable" class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                        <tr>
                            <th>ID</th>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Phone</th>
                            <th>Role</th>
                            <th>Status</th>
                            
                            <th class="text-center">Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="user : ${users}">
                            <td th:text="${user.id}">1</td>
                            <td>
                                <span th:text="${user.name}" class="fw-bold">User Name</span>
                            </td>
                            <td th:text="${user.email}">user@email.com</td>
                            <td th:text="${user.phone}">0912345678</td>
                            <td>
                                <span class="badge bg-info text-dark" th:text="${user.role}">USER</span>
                            </td>
                            <td>
                                <span th:classappend="${user.active ? 'badge bg-success' : 'badge bg-danger'}"
                                      th:text="${user.active ? 'Active' : 'Inactive'}">
                                </span>
                            </td>
                            
                            <td class="text-center">
                                <div class="btn-group">
                                    <button type="button" 
                                            class="btn btn-sm btn-outline-secondary" 
                                            data-bs-toggle="modal" 
                                            data-bs-target="#editUserModal"
                                            th:data-id="${user.id}"
                                            th:data-name="${user.name}"
                                            th:data-email="${user.email}"
                                            th:data-phone="${user.phone}"
                                            th:data-role="${user.role}"
                                            th:data-active="${user.active}"
                                            th:data-building="${user.building}"
                                            th:data-address="${user.address}"
                                            >
                                        Edit
                                    </button>
                                    <a th:href="@{'/admin/users/delete/' + ${user.id}}" 
                                       class="btn btn-sm btn-outline-danger"
                                       onclick="return confirm('Are you sure you want to delete this user?')">
                                        Delete
                                    </a>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    <div class="modal fade" id="addUserModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <form th:action="@{/admin/users/save}" method="post">
                    <div class="modal-header">
                        <h5 class="modal-title">➕ Add New User</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label">Full Name</label>
                                <input type="text" name="name" class="form-control" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Email</label>
                                <input type="email" name="email" class="form-control" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Password</label>
                                <input type="password" name="password" class="form-control" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Phone</label>
                                <input type="text" name="phone" class="form-control">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Role</label>
                                <select name="role" class="form-select">
                                    <option value="USER">USER</option>
                                    <option value="ADMIN">ADMIN</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Building</label>
                                <input type="text" name="building" class="form-control">
                            </div>
                            <div class="col-12">
                                <label class="form-label">Address</label>
                                <textarea name="address" class="form-control" rows="2"></textarea>
                            </div>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                        <button type="submit" class="btn btn-primary">Save User</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div class="modal fade" id="editUserModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header bg-light">
                    <h5 class="modal-title">📝 Edit User Details</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <form th:action="@{/admin/users/save}" method="post">
                    <div class="modal-body">
                        <input type="hidden" name="id" id="u-id">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label">Full Name</label>
                                <input type="text" name="name" id="u-name" class="form-control" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Email</label>
                                <input type="email" name="email" id="u-email" class="form-control" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">New Password (leave blank to keep current)</label>
                                <input type="password" name="password" class="form-control">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Phone</label>
                                <input type="text" name="phone" id="u-phone" class="form-control">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Role</label>
                                <select name="role" id="u-role" class="form-select">
                                    <option value="USER">USER</option>
                                    <option value="ADMIN">ADMIN</option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Account Status</label>
                                <select name="active" id="u-active" class="form-select">
                                    <option value="true">Active</option>
                                    <option value="false">Inactive</option>
                                </select>
                            </div>
                            
                            <div class="col-md-12">
                                <label class="form-label">Building</label>
                                <input type="text" name="building" id="u-building" class="form-control">
                            </div>
                            <div class="col-12">
                                <label class="form-label">Address</label>
                                <textarea name="address" id="u-address" class="form-control" rows="2"></textarea>
                            </div>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-primary">Update User</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script th:inline="javascript">
        const editUserModal = document.getElementById('editUserModal');
        if (editUserModal) {
            editUserModal.addEventListener('show.bs.modal', event => {
                const btn = event.relatedTarget;

                // Map data-attributes to Modal IDs
                const fields = {
                    'id': 'u-id',
                    'name': 'u-name',
                    'email': 'u-email',
                    'phone': 'u-phone',
                    'role': 'u-role',
                    'active': 'u-active',
                    'building': 'u-building',
                    'address': 'u-address'
                };

                Object.keys(fields).forEach(key => {
                    const value = btn.getAttribute('data-' + key);
                    const element = document.getElementById(fields[key]);
                    if (element) {
                        // Handle select and text inputs
                        element.value = value || '';
                    }
                });
            });
        }
    </script>
</div>
</body>
</html>
