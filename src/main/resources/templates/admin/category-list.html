<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: content}">
<body>

<div th:fragment="content">

    <div class="d-flex justify-content-between align-items-center mb-4 p-3 bg-white shadow-sm rounded-4">
        <div>
            <h3 class="fw-bold mb-0 text-success">
                📂 Category Management
            </h3>
            <small class="text-muted">Create, update and manage book categories</small>
        </div>

        <button class="btn btn-success rounded-pill px-4 shadow-sm"
                data-bs-toggle="modal"
                data-bs-target="#addCategoryModal">
            ➕ Add Category
        </button>
    </div>

    <div class="card border-0 shadow-sm rounded-4 overflow-hidden">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table id="categoryTable" class="table table-hover align-middle mb-0">
                    <thead class="table-success text-dark">
                        <tr>
                            <th class="ps-4">ID</th>
                            <th>Category Name</th>
                            <th class="text-center pe-4">Actions</th>
                        </tr>
                    </thead>

                    <tbody>
                        <tr th:each="cat : ${categories}">
                            <td class="ps-4 fw-semibold" th:text="${cat.id}">1</td>
                            <td>
                                <span class="fw-bold text-dark" th:text="${cat.name}">
                                    Category Name
                                </span>
                            </td>
                            <td class="text-center pe-4">
                                <div class="btn-group">
                                    <button class="btn btn-sm btn-outline-primary rounded-pill px-3"
                                            data-bs-toggle="modal"
                                            data-bs-target="#editCategoryModal"
                                            th:attr="data-id=${cat.id}, data-name=${cat.name}">
                                        ✏️ Edit
                                    </button>

                                    <a th:href="@{'/admin/categories/delete/' + ${cat.id}}"
                                       class="btn btn-sm btn-outline-danger rounded-pill px-3 ms-2"
                                       onclick="return confirm('Delete this category?')">
                                        🗑 Delete
                                    </a>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="modal fade" id="addCategoryModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content rounded-4 border-0 shadow">
                <form th:action="@{/admin/categories/save}" method="post">
                    <div class="modal-header bg-light">
                        <h5 class="modal-title fw-bold">➕ Add Category</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body p-4">
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Category Name</label>
                            <input type="text" name="name" class="form-control rounded-3" 
                                   placeholder="Enter category name" required>
                        </div>
                    </div>
                    <div class="modal-footer border-0">
                        <button type="button" class="btn btn-secondary rounded-pill px-4" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-success rounded-pill px-4">Save Category</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div class="modal fade" id="editCategoryModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content rounded-4 border-0 shadow">
                <form th:action="@{/admin/categories/save}" method="post">
                    <div class="modal-header bg-light">
                        <h5 class="modal-title fw-bold">📝 Edit Category</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body p-4">
                        <input type="hidden" name="id" id="cat-id">
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Category Name</label>
                            <input type="text" name="name" id="cat-name" class="form-control rounded-3" required>
                        </div>
                    </div>
                    <div class="modal-footer border-0">
                        <button type="button" class="btn btn-secondary rounded-pill px-4" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-primary rounded-pill px-4">Update Category</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const editModal = document.getElementById('editCategoryModal');
            if (editModal) {
                editModal.addEventListener('show.bs.modal', function (event) {
                    const btn = event.relatedTarget;
                    document.getElementById("cat-id").value = btn.getAttribute("data-id");
                    document.getElementById("cat-name").value = btn.getAttribute("data-name");
                });
            }
        });
    </script>

</div>

</body>
</html>
